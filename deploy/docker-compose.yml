services:
  backend:
    build:
      context: ..
      dockerfile: deploy/backend.Dockerfile
    restart: unless-stopped
    environment:
      ADDR: ":8080"
      DB_PATH: "/data/qonaqzhai.db"
      CORS_ORIGIN: "${PUBLIC_ORIGIN:-https://qonaqzhai.kz}"
      JWT_SECRET: "${JWT_SECRET}"
      JWT_ACCESS_TTL: "15m"
      JWT_REFRESH_TTL: "720h"
      GEMINI_API_KEY: "${GEMINI_API_KEY:-}"
      GEMINI_MODEL: "${GEMINI_MODEL:-gemini-2.0-flash}"
      SMTP_HOST: "${SMTP_HOST:-}"
      SMTP_PORT: "${SMTP_PORT:-587}"
      SMTP_USER: "${SMTP_USER:-}"
      SMTP_PASSWORD: "${SMTP_PASSWORD:-}"
      SMTP_FROM: "${SMTP_FROM:-}"
      FCM_PROJECT_ID: "${FCM_PROJECT_ID:-}"
      FCM_SERVICE_ACCOUNT_KEY: "${FCM_SERVICE_ACCOUNT_KEY:-}"
      PAYBOX_MERCHANT_ID: "${PAYBOX_MERCHANT_ID:-}"
      PAYBOX_SECRET_KEY: "${PAYBOX_SECRET_KEY:-}"
      PAYBOX_SANDBOX: "${PAYBOX_SANDBOX:-true}"
      BASE_URL: "${PUBLIC_ORIGIN:-https://qonaqzhai.kz}"
    volumes:
      - qonaqzhai-data:/data
    expose:
      - "8080"

  frontend:
    build:
      context: ..
      dockerfile: deploy/frontend.Dockerfile
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: "${PUBLIC_ORIGIN:-https://qonaqzhai.kz}"
      NODE_ENV: "production"
    expose:
      - "3000"

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/sites.conf:/etc/nginx/conf.d/qonaqzhai.conf:ro
      - certbot-www:/var/www/certbot
      - certbot-etc:/etc/letsencrypt
    depends_on:
      - backend
      - frontend

  certbot:
    image: certbot/certbot:latest
    restart: unless-stopped
    volumes:
      - certbot-www:/var/www/certbot
      - certbot-etc:/etc/letsencrypt
    entrypoint: /bin/sh -c 'trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h & wait $${!}; done;'

volumes:
  qonaqzhai-data:
  certbot-www:
  certbot-etc:
