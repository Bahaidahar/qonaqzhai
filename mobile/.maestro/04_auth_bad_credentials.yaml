appId: com.example.qonaqzhaiMobile
name: Bad credentials show an error toast
tags:
  - auth
---
- launchApp:
    clearState: true
    clearKeychain: true
- runFlow: helpers/skip_onboarding.yaml
- tapOn:
    id: "login-email"
- waitForAnimationToEnd:
    timeout: 1500
- inputText: "ghost@maestro.test"
- tapOn:
    id: "login-password"
- waitForAnimationToEnd:
    timeout: 1500
- inputText: "wrongpass123"
- tapOn:
    id: "login-submit"
- extendedWaitUntil:
    visible:
      text: ".*invalid credentials.*|.*ApiException.*|.*DioException.*"
    timeout: 8000
