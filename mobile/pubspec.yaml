name: qonaqzhai_mobile
description: Qonaqzhai mobile client — event services marketplace for Kazakhstan.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State + DI
  flutter_riverpod: ^2.5.3
  riverpod_annotation: ^2.3.5

  # Network
  dio: ^5.7.0
  pretty_dio_logger: ^1.4.0

  # Codegen models / JSON
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Navigation
  go_router: ^14.2.7

  # Storage
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.3.2

  # Firebase / Push
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3

  # UI helpers
  cached_network_image: ^3.4.1
  intl: ^0.20.1
  url_launcher: ^6.3.1
  web_socket_channel: ^3.0.1
  image_picker: ^1.1.2
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.13
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.3
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  generate: true
