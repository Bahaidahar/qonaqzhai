openapi: 3.0.3
info:
  title: Qonaqzhai API
  description: |
    REST API for the Qonaqzhai event services marketplace.
    Roles: customer, vendor, admin.
  version: "1.0.0"
  contact:
    name: Qonaqzhai
    url: https://qonaqzhai.kz

servers:
  - url: http://localhost:8080
    description: Local dev
  - url: https://qonaqzhai.kz
    description: Production

tags:
  - name: auth
  - name: vendor
  - name: booking
  - name: review
  - name: chat
  - name: admin
  - name: payment
  - name: notifications

security:
  - bearerAuth: []

paths:
  /api/health:
    get:
      tags: [auth]
      summary: Health check
      security: []
      responses:
        "200":
          description: ok

  /api/signup:
    post:
      tags: [auth]
      summary: Register a new account
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SignupRequest"
      responses:
        "201":
          description: created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          $ref: "#/components/responses/Error"
        "409":
          $ref: "#/components/responses/Error"
        "429":
          $ref: "#/components/responses/Error"

  /api/login:
    post:
      tags: [auth]
      summary: Login
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          $ref: "#/components/responses/Error"

  /api/auth/refresh:
    post:
      tags: [auth]
      summary: Rotate refresh token
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                refreshToken: { type: string }
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          $ref: "#/components/responses/Error"

  /api/auth/logout:
    post:
      tags: [auth]
      summary: Revoke refresh token
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                refreshToken: { type: string }
      responses:
        "204":
          description: revoked

  /api/auth/forgot-password:
    post:
      tags: [auth]
      summary: Start password reset (silent for unknown emails)
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email: { type: string, format: email }
      responses:
        "200":
          description: ok

  /api/auth/reset-password:
    post:
      tags: [auth]
      summary: Consume reset token + set new password
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                token: { type: string }
                newPassword: { type: string }
      responses:
        "200":
          description: ok
        "401":
          $ref: "#/components/responses/Error"

  /api/me:
    get:
      tags: [auth]
      summary: Current user
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          $ref: "#/components/responses/Error"

  /api/vendors:
    get:
      tags: [vendor]
      summary: Search the vendor catalog
      security: []
      parameters:
        - in: query
          name: q
          schema: { type: string }
        - in: query
          name: category
          schema: { type: string }
        - in: query
          name: city
          schema: { type: string }
        - in: query
          name: price_min
          schema: { type: integer, format: int64 }
        - in: query
          name: price_max
          schema: { type: integer, format: int64 }
        - in: query
          name: rating_min
          schema: { type: number, format: float }
        - in: query
          name: sort
          schema:
            type: string
            enum: [newest, price_asc, price_desc, rating_desc]
        - in: query
          name: page
          schema: { type: integer, default: 1 }
        - in: query
          name: limit
          schema: { type: integer, default: 20 }
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items: { $ref: "#/components/schemas/Vendor" }
                  total: { type: integer }
                  page: { type: integer }
                  limit: { type: integer }

  /api/vendors/{id}:
    get:
      tags: [vendor]
      summary: Vendor detail
      security: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Vendor" }
        "404":
          $ref: "#/components/responses/Error"

  /api/vendors/{id}/reviews:
    get:
      tags: [review]
      summary: Reviews of a vendor
      security: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items: { $ref: "#/components/schemas/Review" }

  /api/vendor:
    get:
      tags: [vendor]
      summary: Caller's vendor profile
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Vendor" }
        "404":
          $ref: "#/components/responses/Error"
    post:
      tags: [vendor]
      summary: Create or update caller's vendor profile
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/VendorInput" }
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Vendor" }

  /api/vendor/photos:
    post:
      tags: [vendor]
      summary: Upload a vendor photo (multipart/form-data)
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                photo:
                  type: string
                  format: binary
      responses:
        "201":
          description: created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Photo" }
        "413":
          $ref: "#/components/responses/Error"

  /api/vendor/photos/{id}:
    delete:
      tags: [vendor]
      summary: Delete a vendor photo (must be owner)
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "204":
          description: deleted
        "403":
          $ref: "#/components/responses/Error"

  /api/photos/{id}:
    get:
      tags: [vendor]
      summary: Serve a photo blob
      security: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: image bytes
          content:
            image/*: {}

  /api/chat:
    post:
      tags: [chat]
      summary: Send a message to the AI planner
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                message: { type: string }
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                type: object
                properties:
                  reply: { type: string }
                  blocks:
                    type: array
                    items:
                      type: object
                      properties:
                        type: { type: string, enum: [plan, budget, vendors] }
                        data: { type: object }

  /api/bookings:
    get:
      tags: [booking]
      summary: List bookings (scoped by role)
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items: { $ref: "#/components/schemas/Booking" }
    post:
      tags: [booking]
      summary: Customer creates a new booking
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [vendorId, eventDate]
              properties:
                vendorId: { type: string }
                eventDate: { type: string }
                guestCount: { type: integer }
                note: { type: string }
                amount: { type: integer, format: int64 }
      responses:
        "201":
          description: created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Booking" }

  /api/bookings/{id}:
    patch:
      tags: [booking]
      summary: Update booking status (role-aware)
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                status: { $ref: "#/components/schemas/BookingStatus" }
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Booking" }

  /api/bookings/{id}/pay:
    post:
      tags: [payment]
      summary: Start a PayBox payment for a booking
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: redirect URL
          content:
            application/json:
              schema:
                type: object
                properties:
                  redirectUrl: { type: string, format: uri }

  /api/webhooks/paybox:
    post:
      tags: [payment]
      summary: PayBox callback (form-encoded)
      security: []
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
      responses:
        "200":
          description: acknowledged

  /api/reviews:
    post:
      tags: [review]
      summary: Submit a review (completed booking only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [bookingId, rating]
              properties:
                bookingId: { type: string }
                rating: { type: integer, minimum: 1, maximum: 5 }
                text: { type: string }
      responses:
        "201":
          description: created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Review" }

  /api/notifications:
    get:
      tags: [notifications]
      summary: List inbox notifications
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items: { $ref: "#/components/schemas/Notification" }

  /api/notifications/tokens:
    post:
      tags: [notifications]
      summary: Register an FCM device token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token]
              properties:
                token: { type: string }
                platform: { type: string }
      responses:
        "204":
          description: registered
    delete:
      tags: [notifications]
      summary: Unregister an FCM device token
      parameters:
        - in: query
          name: token
          required: true
          schema: { type: string }
      responses:
        "204":
          description: removed

  /api/admin/users:
    get:
      tags: [admin]
      summary: List users
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items: { $ref: "#/components/schemas/User" }

  /api/admin/users/{id}:
    patch:
      tags: [admin]
      summary: Suspend / restore a user
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                  enum: [active, suspended]
      responses:
        "200":
          description: ok

  /api/admin/vendors/{id}:
    patch:
      tags: [admin]
      summary: Moderate a vendor profile
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                  enum: [pending, approved, rejected]
      responses:
        "200":
          description: ok

  /api/admin/reviews/{id}:
    delete:
      tags: [admin]
      summary: Delete a review and recompute the vendor's rating aggregate
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "204":
          description: deleted

  /api/admin/stats:
    get:
      tags: [admin]
      summary: Aggregate platform KPIs
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                type: object
                additionalProperties: { type: integer }

  /api/admin/stats/bookings:
    get:
      tags: [admin]
      summary: Bookings time-series by day
      parameters:
        - in: query
          name: from
          schema: { type: string, format: date }
        - in: query
          name: to
          schema: { type: string, format: date }
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      type: object
                      properties:
                        date: { type: string }
                        value: { type: integer }

  /api/admin/stats/categories:
    get:
      tags: [admin]
      summary: Top vendor categories
      parameters:
        - in: query
          name: limit
          schema: { type: integer, default: 10 }
      responses:
        "200":
          description: ok

  /api/admin/stats/funnel:
    get:
      tags: [admin]
      summary: Vendor approval funnel
      responses:
        "200":
          description: ok

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  responses:
    Error:
      description: Error envelope
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ApiError" }

  schemas:
    ApiError:
      type: object
      properties:
        error: { type: string }

    SignupRequest:
      type: object
      required: [email, password]
      properties:
        email: { type: string, format: email }
        password: { type: string, minLength: 8 }
        name: { type: string }
        role: { type: string, enum: [customer, vendor] }

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email: { type: string, format: email }
        password: { type: string }

    AuthResponse:
      type: object
      properties:
        token: { type: string, description: "Same as accessToken (legacy alias)" }
        accessToken: { type: string }
        refreshToken: { type: string }
        user: { $ref: "#/components/schemas/User" }

    User:
      type: object
      properties:
        id: { type: string }
        email: { type: string, format: email }
        name: { type: string }
        role: { type: string, enum: [customer, vendor, admin] }
        status: { type: string, enum: [active, suspended] }
        createdAt: { type: string, format: date-time }

    Vendor:
      type: object
      properties:
        id: { type: string }
        userId: { type: string }
        name: { type: string }
        category: { type: string }
        city: { type: string }
        description: { type: string }
        priceFrom: { type: integer, format: int64 }
        status: { type: string, enum: [pending, approved, rejected] }
        ratingAvg: { type: number, format: float }
        ratingCount: { type: integer }
        photoIds:
          type: array
          items: { type: string }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    VendorInput:
      type: object
      required: [name, category, city]
      properties:
        name: { type: string }
        category: { type: string }
        city: { type: string }
        description: { type: string }
        priceFrom: { type: integer, format: int64 }

    Photo:
      type: object
      properties:
        id: { type: string }
        vendorId: { type: string }
        mime: { type: string }
        size: { type: integer, format: int64 }
        createdAt: { type: string, format: date-time }

    BookingStatus:
      type: string
      enum: [pending, accepted, declined, cancelled, completed, paid]

    Booking:
      type: object
      properties:
        id: { type: string }
        customerId: { type: string }
        vendorId: { type: string }
        eventDate: { type: string }
        guestCount: { type: integer }
        note: { type: string }
        status: { $ref: "#/components/schemas/BookingStatus" }
        amount: { type: integer, format: int64 }
        paymentId: { type: string }
        createdAt: { type: string, format: date-time }

    Review:
      type: object
      properties:
        id: { type: string }
        bookingId: { type: string }
        customerId: { type: string }
        vendorId: { type: string }
        rating: { type: integer, minimum: 1, maximum: 5 }
        text: { type: string }
        createdAt: { type: string, format: date-time }

    Notification:
      type: object
      properties:
        id: { type: string }
        userId: { type: string }
        type: { type: string }
        channel: { type: string, enum: [email, push, "email+push"] }
        title: { type: string }
        body: { type: string }
        status: { type: string, enum: [queued, sent, failed] }
        createdAt: { type: string, format: date-time }
